<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CycleFlow — 月經週期紀錄與預測</title>
  <meta name="description" content="CycleFlow 是一款簡約、現代的月經週期紀錄與預測工具，所有資料皆儲存於您的裝置中，完全保護隱私。">
  
  <!-- Web App Manifest (提供手機主畫面安裝) -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#FFB6C1">
  <!-- iOS 蘋果設備的圖標 -->
  <link rel="apple-touch-icon" href="icon.png">
  
  <link rel="stylesheet" href="style.css?v=2">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="app-container">

  <!-- Auth Section -->
  <section class="auth-screen fade-in" id="authScreen">
    <div class="card" style="margin-top: 2rem;">
      <div class="card__title" style="justify-content:center;font-size:1.5rem;margin-bottom:1rem;display:flex;align-items:center;">
        <img src="icon.svg" alt="App Icon" width="32" height="32" style="margin-right:0.5rem; border-radius:50%; box-shadow:0 2px 8px rgba(255, 182, 193, 0.4);">
        CycleFlow
      </div>
      <p style="text-align:center;margin-bottom:1.5rem;color:var(--text-light);">登入或註冊以啟用雲端同步與伴侶共享功能</p>
      <form id="authForm" class="auth-form" onsubmit="return false;">
        <input type="email" id="authEmail" class="form-input" placeholder="電子信箱" required style="width:100%;padding:0.8rem;margin-bottom:1rem;border:1px solid #ddd;border-radius:8px;">
        <input type="password" id="authPassword" class="form-input" placeholder="密碼 (至少6位)" required minlength="6" style="width:100%;padding:0.8rem;margin-bottom:1rem;border:1px solid #ddd;border-radius:8px;">
        <div id="authError" style="color:var(--danger);font-size:0.9rem;text-align:center;margin-bottom:1rem;display:none;"></div>
        <div class="auth-actions" style="display:flex;gap:1rem;">
          <button type="button" class="btn btn--secondary" id="btnRegister" style="flex:1;">註冊</button>
          <button type="button" class="btn btn--primary" id="btnLogin" style="flex:1;">登入</button>
        </div>
      </form>
    </div>
  </section>

  <!-- Main App Content -->
  <div id="mainApp" style="display:none">

  <!-- Header -->
  <header class="app-header fade-in">
    <div class="app-header__logo">
      <img src="icon.svg" alt="App Icon" class="app-header__icon" style="background:transparent; padding:0;">
      <h1 class="app-header__title">CycleFlow</h1>
    </div>
    <p class="app-header__subtitle">月經週期紀錄與智慧預測</p>
    <!-- Header Actions -->
    <div class="header-actions" id="headerActions" style="margin-top:1rem;display:flex;justify-content:center;gap:0.5rem;flex-wrap:wrap;">
      <button class="btn btn--secondary btn--small" id="btnPartnerMode" style="font-size:0.85rem;padding:0.4rem 0.8rem;">伴侶模式: 關閉</button>
      <button class="btn btn--danger btn--small" id="btnLogout" style="font-size:0.85rem;padding:0.4rem 0.8rem;">登出</button>
    </div>
    <div id="currentUserDisplay" style="text-align:center;font-size:0.75rem;color:var(--text-light);margin-top:0.5rem;"></div>
  </header>

  <!-- Today Badge -->
  <div style="text-align:center" class="fade-in">
    <div class="today-badge" id="todayBadge">
      <span>📅</span>
      <span id="todayBadgeText">載入中...</span>
    </div>
  </div>

  <!-- Summary Section -->
  <section class="card fade-in" id="summaryCard">
    <div class="card__title">
      <span class="card__title-icon">📊</span>
      數據摘要
    </div>
    <div class="summary-grid">
      <div class="summary-item">
        <div class="summary-item__value" id="avgCycleLength">--</div>
        <div class="summary-item__label">平均週期<br>(天)</div>
      </div>
      <div class="summary-item">
        <div class="summary-item__value" id="avgDuration">--</div>
        <div class="summary-item__label">平均持續<br>(天)</div>
      </div>
      <div class="summary-item">
        <div class="summary-item__value" id="daysUntilNext">--</div>
        <div class="summary-item__label">距下次<br>(天)</div>
      </div>
    </div>
  </section>

  <!-- Calendar Section -->
  <section class="card fade-in" id="calendarCard">
    <div class="card__title">
      <span class="card__title-icon">🗓️</span>
      互動行事曆
    </div>
    <div class="calendar-nav">
      <button class="calendar-nav__btn" id="prevMonth" aria-label="上個月">‹</button>
      <div class="calendar-nav__month" id="currentMonth"></div>
      <button class="calendar-nav__btn" id="nextMonth" aria-label="下個月">›</button>
    </div>
    <div class="calendar-weekdays">
      <span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span>
    </div>
    <div class="calendar-days" id="calendarDays"></div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot legend-dot--period"></div>經期</div>
      <div class="legend-item"><div class="legend-dot legend-dot--predicted"></div>預測經期</div>
      <div class="legend-item"><div class="legend-dot legend-dot--ovulation"></div>排卵日</div>
      <div class="legend-item"><div class="legend-dot legend-dot--fertile"></div>易孕期</div>
      <div class="legend-item"><div class="legend-dot legend-dot--sex"></div>性行為</div>
    </div>
  </section>

  <!-- History Section -->
  <section class="card fade-in" id="historyCard">
    <div class="card__title">
      <span class="card__title-icon">📋</span>
      經期紀錄
    </div>
    <ul class="history-list" id="historyList">
      <li class="history-empty">尚無紀錄，點擊行事曆日期來新增</li>
    </ul>
  </section>

  </div> <!-- Close mainApp -->

  <!-- Footer -->
  <footer class="app-footer">
    CycleFlow &copy; 2026 — 支援雲端同步與離線使用
  </footer>

</div>

<!-- Duration Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal__title" id="modalTitle">編輯每日紀錄</div>
    <div class="modal__date" id="modalDate"></div>
    
    <div class="modal__section" style="margin-bottom: 20px; text-align: left; background: var(--clr-primary-ultra-light); padding: 12px; border-radius: var(--radius-sm);">
      <label style="display:flex; align-items:center; cursor:pointer; font-weight:600; color:var(--clr-text);">
        <input type="checkbox" id="checkHadSex" style="margin-right:10px; width:18px; height:18px; accent-color:var(--clr-period-red);">
        💕 有性行為
      </label>
    </div>

    <div class="modal__section" style="text-align: left; background: var(--clr-bg); padding: 12px; border-radius: var(--radius-sm); border: 1px solid var(--clr-border);">
      <label style="display:flex; align-items:center; cursor:pointer; font-weight:600; color:var(--clr-text); margin-bottom: 10px;">
        <input type="checkbox" id="checkIsPeriodStart" style="margin-right:10px; width:18px; height:18px; accent-color:var(--clr-period-red);">
        🩸 這是經期第一天
      </label>
      
      <div id="durationWrap" style="display:none; padding-left: 28px;">
        <div class="modal__label" style="text-align: left; margin-bottom: 8px;">持續天數</div>
        <div class="duration-selector" style="justify-content: flex-start; margin-bottom: 0;">
          <button class="duration-selector__btn" id="durationMinus">−</button>
          <div class="duration-selector__value" id="durationValue">5</div>
          <button class="duration-selector__btn" id="durationPlus">+</button>
        </div>
      </div>
    </div>

    <div class="modal-actions" style="margin-top: 24px;">
      <button class="btn btn--secondary" id="modalCancel">取消</button>
      <button class="btn btn--danger" id="modalDelete" style="display:none">刪除經期</button>
      <button class="btn btn--primary" id="modalSave">確認</button>
    </div>
  </div>
</div>

<!-- Cycle Anomaly Warning Alert -->
<div class="alert-overlay" id="alertOverlay">
  <div class="alert-box" id="alertBox">
    <div class="alert-box__icon" id="alertIcon">⚠️</div>
    <div class="alert-box__title" id="alertTitle">週期提醒</div>
    <div class="alert-box__interval" id="alertInterval"></div>
    <div class="alert-box__message" id="alertMessage"></div>
    <button class="btn btn--primary" id="alertDismiss">我知道了</button>
  </div>
</div>

<script src="app.js?v=2"></script>
</body>
</html>
