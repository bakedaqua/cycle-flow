    <path d="M 0 0 C 12 -15 15 -35 0 -40 C -15 -35 -12 -15 0 0 Z" transform="rotate(144)" />
    <path d="M 0 0 C 12 -15 15 -35 0 -40 C -15 -35 -12 -15 0 0 Z" transform="rotate(216)" />
    <path d="M 0 0 C 12 -15 15 -35 0 -40 C -15 -35 -12 -15 0 0 Z" transform="rotate(288)" />
    <!-- 花蕊中心 -->
